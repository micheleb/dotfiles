set -g default-terminal "screen-256color"

set -g history-limit 20000

# automatically renumber tmux windows
set -g renumber-windows on

# unbind default prefix and set it to Ctrl+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# for nested tmux sessions
bind-key a send-prefix

# Activity Monitoring
setw -g monitor-activity off
set -g visual-activity off
# Claude Code rings the terminal bell when it wants attention; catch it for the tab dots.
set -g monitor-bell on
# Relay focus in/out to panes so Claude can tell when its tab is unfocused and actually
# ring the bell (without this the bell, and thus the tab dot, gets suppressed). Also makes
# the pane-focus-in hook below fire.
set -g focus-events on

## Rather than constraining window size to the maximum size of any client
## connected to the *session*, constrain window size to the maximum size of any
## client connected to *that window*. Much more reasonable.
setw -g aggressive-resize on

## make delay shorter
set -sg escape-time 0

## tile all windows
unbind =
bind = select-layout tiled

# cycle through panes
# unbind C-a
# unbind o # this is the default key for cycling panes
# bind ^A select-pane -t:.+

# make window/pane index start with 1
set -g base-index 1
setw -g pane-base-index 1

set-option -g set-titles on
set-option -g set-titles-string "#T - #W"
set-window-option -g automatic-rename on

######################
#### Key Bindings ####
######################

# reload config file
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# quickly open a new window
bind N new-window

# split window and fix path for tmux 1.9
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# synchronize all panes in a window
bind y setw synchronize-panes

# pane movement shortcuts
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize pane shortcuts
bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10

# maximizing and restoring windows
unbind Up
bind Up new-window -d -n fullscreen \; swap-pane -s fullscreen.1 \; select-window -t fullscreen
unbind Down
bind Down last-window \; swap-pane -s fullscreen.1 \; kill-window -t fullscreen

# set vi mode for copy mode
setw -g mode-keys vi
# more settings to make copy-mode more vim-like
unbind [
bind Escape copy-mode
unbind p
bind p paste-buffer

# Modern macOS clipboard integration (no reattach-to-user-namespace needed)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# Rectangle selection toggle (like vim visual block)
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Quick copy-mode entry: Option+Up enters copy mode and scrolls up
bind -n M-Up copy-mode \; send-keys -X halfpage-up

# Quick pane zoom toggle with Option+z (no prefix needed)
bind -n M-z resize-pane -Z

set -g mouse on
# we use p for paste, so...
bind b previous-window

# Pi stuff
set -g extended-keys on
set -g extended-keys-format csi-u

##############################
### Color & Style Settings ###
##############################

# source ~/.tmux/pink-blue-theme.sh
# source ~/.tmux/gray-blue-theme.sh

set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'egel/tmux-gruvbox'
set -g @tmux-gruvbox 'dark'
set -g @plugin 'tmux-plugins/tmux-resurrect'

run '~/.tmux/plugins/tpm/tpm'

##################################
### Claude Code attention markers ###
##################################
# Placed after tpm so the gruvbox plugin can't overwrite these.

# TAB-LEVEL: prefix the window name with 🔴 when its bell flag is set (Claude Code rings the
# terminal bell via preferredNotifChannel=terminal_bell on permission prompts / idle; monitor-bell
# is already on). gruvbox builds window-status-format from powerline glyphs that don't survive
# being copied as text, so instead of pinning the string, a helper reads whatever the theme set
# and injects 🔴 before #W byte-for-byte. Runs after tpm so gruvbox's format already exists.
# (glyphs preserved, theme-update-proof). Backgrounded with a short delay so tpm/gruvbox have
# finished setting the format first. Only shows for non-current windows (the active window's
# bell flag is always cleared by tmux).
run-shell -b 'sleep 1; ~/.tmux/claude-attention-marker.sh'

# gruvbox reverse-videos a tab when its bell rings, which greys out the whole tab. The 🔴 dot
# is already the signal, so keep the tab's normal colors. Must run after tpm (the theme sets it).
set -gw window-status-bell-style default

# PANE-LEVEL: show which pane is waiting (tmux has no per-pane bell flag). Claude Code
# hooks set @claude_attention on their own $TMUX_PANE; cleared on prompt submit (UserPromptSubmit
# hook) or on any focus change touching the pane (the pane-focus-in/out hooks below; need
# focus-events on). focus-out fires for the pane losing focus, so the marker also clears when
# you leave a pane Claude stopped in while you were watching it.
set -g pane-border-status top
set -g pane-border-format '#{?@claude_attention,🔴 WAITING ,}#{pane_index}: #{pane_current_command}'
set-hook -g pane-focus-in 'set -pu @claude_attention'
set-hook -g pane-focus-out 'set -pu @claude_attention'
